<!DOCTYPE html>
<html lang="en">

<head>
  <title>Bootstrap Card</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/js/bootstrap.min.js"></script>
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center">
    <div>
      <h2>Карточка сотрудника</h2>

      <div class="card" style="width:400px">
        <img class="card-img-top" src="./photo.png" alt="Card image" style="width:100%">
        <div class="card-body">
          <h4 class="card-title">
            Артюшевский Артём
          </h4>
          <p class="card-text">Место учебы: МГКЦТ</p>
          <p class="card-text">Год рождения: 06.03.2007</p>
          <p class="card-text">Личные качества: прагматичность</p>
          <p class="card-text">Языки программирования, которые используются: C#</p>
          <a href="#" class="btn btn-primary">See Profile</a>
        </div>
      </div>
    </div>
  </div>

</body>

</html>

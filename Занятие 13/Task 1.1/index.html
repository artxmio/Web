<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title></title>

    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.5/jquery.min.js"></script>
    <link href="http://ajax.googleapis.com/ajax/libs/jqueryui/1.8/themes/base/jquery-ui.css" rel="stylesheet"
        type="text/css" />
    <script src="http://ajax.googleapis.com/ajax/libs/jqueryui/1.8/jquery-ui.min.js"></script>

    <script type="text/javascript">

        $(document).ready(function () {
            $("p").css("fontSize", "20px");
            $("#el2").css("color", "green");
            $(".el3").css("color", "red");
            $("#el2, .el3").css("fontWeight", "bold");
            $(":input").css("color", "blue");
            $("[href]").css("fontSize", "blue");
            $("[href='http://www.wisdomweb.ru/']").css("color", "green");
        });

    </script>
</head>

<body>
    <p>Я первый элемент</p>
    <p id="el2">Я второй элемент</p>
    <p class="el3">Я третий элемент</p>
    <input type="button" value="Я кнопка">
    <br /><br />
    <a href="http://www.wisdomweb.ru/">wisdomweb.ru</a>
    <br /><br />
    <a href="http://www.wisdomweb.ru/HTML/">HTML учебник</a>
</body>

</html>

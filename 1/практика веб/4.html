<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>структура страницы</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
        }
        .container {
            width: 90%;
            max-width: 1024px;
            margin: 0 auto;
            padding: 10px;
            background-color: bisque;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f4c7a7;
        }
        .logo {
            background: #fff;
            padding: 5px 10px;
            border-radius: 5px;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
        }
        nav a {
            text-decoration: none;
            color: #5a3e36;
            font-weight: bold;
        }
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .col {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
        }
        .col-1-3 {
            width: 33.33%;
            background: #add8e6;
        }
        .col-2-3 {
            width: 66.66%;
            background: #f5f5dc;
        }
        .col-1-2 {
            width: 50%;
            background: #7fff00;
        }
        .col-1-4 {
            width: 25%;
        }
        .yellow { background: #ffeb3b; }
        .green { background: #32cd32; }
        .pink { background: #ffc0cb; }
        footer {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f4c7a7;
        }
        footer .col {
            width: 33.33%;
            background: #deb887;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">LOGO</div>
        <nav>
            <ul>
                <li><a href="#">Главная</a></li>
                <li><a href="#">О нас</a></li>
                <li><a href="#">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="row">
            <div class="col col-1-3">1/3</div>
            <div class="col col-2-3">2/3</div>
        </div>
        <div class="row">
            <div class="col col-1-2">1/2</div>
            <div class="col col-1-2">1/2</div>
        </div>
        <div class="row">
            <div class="col col-1-4 yellow">1/4</div>
            <div class="col col-1-4 green">1/4</div>
            <div class="col col-1-2 pink">1/2</div>
        </div>
    </div>

    <footer>
        <div class="col">подвал</div>
        <div class="col">подвал</div>
        <div class="col">подвал</div>
    </footer>

</body>
</html>

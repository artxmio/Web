<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/js/bootstrap.min.js"></script>
  <style>
    .center-header {
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <div class="center-header text-danger">
  <h2>Apple Store</h2>
    </div>         
  <p class="center-header">Выберите модель Iphone</p>            
  <div class="container">
    <button type="button" class="btn border-secondary btn-outline-dark">iPhone 11</button>
    <button type="button" class="btn border-secondary btn-outline-dark">iPhone 11 pro</button>
    <button type="button" class="btn border-secondary btn-outline-dark">iPhone 11 pro Max</button>
    <button type="button" class="btn border-secondary btn-outline-dark">iPhone 12</button>
    <button type="button" class="btn border-secondary btn-outline-dark">iPhone 12 mini</button>
    <button type="button" class="btn border-secondary btn-outline-dark">iPhone 12 pro</button>
    <button type="button" class="btn border-secondary btn-outline-dark">iPhone 12 pro Max</button>    
  </div>
  <h3 class="center-header">Рекомендуемые девайсы:</h3>
  <table class="table table-hover bg-dark">
    <thead>
      <tr>
        <th class="text-white font-weight-bold">Название</th>
        <th class="text-white font-weight-bold">Цена</th>
      </tr>
    </thead>
    <tbody>
      <tr class="bg-secondary">
        <td class="text-white">AirPods</td>
        <td class="text-white">100$</td>
      </tr>
      <tr>
        <td class="text-white">iPad</td>
        <td class="text-white ">250$</td>
      </tr>
      <tr>
        <td class="text-white">Macbook</td>
        <td class="text-white ">1000$</td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>

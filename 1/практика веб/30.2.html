<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/js/bootstrap.min.js"></script>
  <style>
    .center-header {
        text-align: center;
    }
</style>
</head>
<body>

<div class="container">
    <div class="center-header text-success">
  <h2 class="text-primary">Sony Group Corparation</h2>
    </div>
  <p class="text-primary font-weight-bold">Sony Group Corparation - японская транснациональная корпорация со штаб квартирой в Токио, образованная 7 мая 1946 года.</p>                    
  <table class="table table-hover bg-dark">
    <thead>
      <tr>
        <th class="text-primary font-weight-bold">PlayStation</th>
        <th class="text-primary font-weight-bold">Cost</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="text-primary">PlayStation 4 (PS4)</td>
        <td class="text-primary">1000$</td>
      </tr>
      <tr>
        <td class="text-primary">PlayStation 5 (PS5)</td>
        <td class="text-primary">2000$</td>
      </tr>
    </tbody>
  </table>
  <div class="btn-group">
    <button type="button" class="btn btn-primary dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
      Sony
    </button>
    <div class="dropdown-menu">
      <a class="dropdown-item" href="#">Tablet</a>
      <a class="dropdown-item" href="#">Smartphone</a>
      <a class="dropdown-item" href="#">PlayStation (PS)</a>
      <a class="dropdown-item" href="#">TV</a>
      <a class="dropdown-item" href="#">Cameras</a>
      <a class="dropdown-item" href="#">Films</a>
    </div>
  </div>
  

</div>

</body>
</html>

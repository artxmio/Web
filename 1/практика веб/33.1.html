<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Card</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.0/js/bootstrap.min.js"></script>
</head>
<body> 
 
<div class="container">
  <h2>Карточка сотрудника</h2>

  <div class="card" style="width:400px">
    <img class="card-img-top" src="профиль.png" alt="Card image" style="width:80%">
    <div class="card-body">
      <h4 class="card-title">Костюкевич Валерия</h4>
      <p class="card-text">МГК цифровых технологий</p>
      <p class="card-text">5 марта 2007 года</p>
      <p class="card-text">Финансовая грамотность</p>
      <p class="card-text">html</p>
      <a href="#" class="btn btn-primary">See Profile</a>
    </div>
  </div>

  
</div>

</body>
</html>

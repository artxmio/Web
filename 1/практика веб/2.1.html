<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашняя страничка Чугунов Никита</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        header, footer {
            background: lightblue;
            padding: 20px;
            text-align: center;
        }
        .container {
            flex: 1;
            display: flex;
        }
        nav {
            width: 100%;
            background: lightgray;
            padding: 20px;
            text-align: center;
        }
        main {
            flex: 1;
            background: white;
            padding: 100px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header style="background: lightblue; padding: 10px;">Чугунов Никита Техник Программист</header>
    <nav style="background: lightgray; padding: 10px;">Меню</nav>
    <main style="background: white; padding: 10px;">Контент</main>
    <footer style="background: lightblue; padding: 10px;">Подвал сайта</footer>
</body>
</html>

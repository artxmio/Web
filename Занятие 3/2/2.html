<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and Styles</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        div {
            background-color: lightblue;
            height: 150px;
            width: 300px;
            border: 2px solid black;
            padding: 20px;
            margin: 10px;
        }

        a {
            font-size: 20px;
            color: red;
        }

        img {
            border: 2px solid green;
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            width: 200px;
            height: auto;
            vertical-align: middle;
        }

        label {
            font-size: 18px;
            color: darkblue;
            margin: 5px;
        }

        p {
            margin: 10px;
            background-color: lavender;
        }

        table {
            background-color: lightyellow;
            border: 2px solid black;
        }

        tr {
            text-align: center;
            border-color: gray;
        }

        td {
            height: 50px;
        }

        ul {
            list-style-type: circle;
            list-style-position: inside;
        }
    </style>
</head>

<body>
    <div style="background-image: url('2.jpg');">
        <p>Пример содержимого</p>
    </div>
    <a href="#">Ссылка</a>
    <img src="2.jpg" alt="Пример изображения">
    <label for="example">Метка</label>
    <p>Пример текста</p>
    <table>
        <tr>
            <td>Ячейка 1</td>
            <td>Ячейка 2</td>
        </tr>
    </table>
    <ul>
        <li>Первый элемент списка</li>
        <li>Второй элемент списка</li>
    </ul>
</body>

</html>
